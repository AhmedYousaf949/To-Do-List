<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <!--Favicon-->
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
      <main class="container">
        <!--Header-->
  <header class="hero">
    <h1>Welcome to Yugen Tech</h1>
  </header>
  <!--Logo-->
  <section class="logo-container">
    <img src="assets/favicon.png" alt="Logo" class="logo">
  </section>
  <!--Cards Container-->
<section class="cards-container">
  <div class="card">
    <button class="card-header">
      <h2>Task One</h2>
      <span class="toggle">Show </span>
    </button>
    <div class="card-content">
      <p>
        This is the detailed description for Task One. Add due dates,
        notes, or any extra information here.
      </p>
    </div>
  </div>
  <div class="card">
    <button class="card-header">
      <h2>Task Two</h2>
      <span class="toggle">Show </span>
    </button>
    <div class="card-content">
      <p>
        Details for Task Two go here.
      </p>
    </div>
  </div>
  <div class="card">
    <button class="card-header">
      <h2>Task Three</h2>
      <span class="toggle">Show </span>
    </button>
    <div class="card-content">
      <p>
        Details for Task Three go here.
      </p>
    </div>
  </div>
</section>
<script src="js/main.js"></script>
</body>
</html>
